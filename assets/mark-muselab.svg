  .ink{stroke:var(--ink);stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .fer{stroke:var(--ferric);stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round;}
