<svg xmlns="http://www.w3.org/2000/svg" width="220" height="20" viewBox="0 0 220 20" role="img" aria-label="colophon">
<style><![CDATA[

  svg{--ink:#8c8276;--ferric:#997419;}
  @media (prefers-color-scheme: dark){svg{--ink:#8a8175;--ferric:#c99c3e;}}
  .rule{stroke:var(--ink);stroke-width:1;opacity:0.4;}
  .dot{fill:var(--ferric);transform-box:fill-box;transform-origin:center;
       animation:travel 4.5s cubic-bezier(.2,.7,.2,1) .3s both, pulse 7s ease-in-out 5.2s infinite;}
  @keyframes travel{from{transform:translateX(-190px);opacity:0}45%{opacity:1}to{transform:translateX(0);opacity:1}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
]]></style>
<line class="rule" x1="6" y1="10" x2="196" y2="10"/>
<circle class="dot" cx="196" cy="10" r="3"/>
</svg>
